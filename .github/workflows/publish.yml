name: publish

on:
    push:
        branches:
            - main

jobs:
    publish:
        name: npm publish
        runs-on: ubuntu-latest
        permissions:
            id-token: write  # required for npm provenance

        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: '22'
                  cache: yarn
                  registry-url: 'https://registry.npmjs.org'

            - name: Install dependencies
              run: yarn install --frozen-lockfile

            - name: Type check
              run: yarn tsc --noEmit

            - name: Run tests
              run: yarn test

            - name: Build
              run: yarn build

            - name: Check if version already published
              id: version_check
              run: |
                  CURRENT=$(node -p "require('./package.json').version")
                  echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
                  PUBLISHED=$(npm view @tilt-react-native/react-native version 2>/dev/null || echo "none")
                  echo "published=$PUBLISHED" >> "$GITHUB_OUTPUT"
                  if [ "$CURRENT" = "$PUBLISHED" ]; then
                      echo "skip=true" >> "$GITHUB_OUTPUT"
                      echo "Version $CURRENT already published — skipping."
                  else
                      echo "skip=false" >> "$GITHUB_OUTPUT"
                      echo "Publishing $CURRENT (was: $PUBLISHED)"
                  fi

            - name: Publish to npm
              if: steps.version_check.outputs.skip == 'false'
              run: npm publish --access public --provenance
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
