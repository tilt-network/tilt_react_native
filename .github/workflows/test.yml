name: test

on:
    push:
        branches-ignore:
            - main
    pull_request:
        branches-ignore:
            - main

jobs:
    typescript:
        name: typescript-tests
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: '22'
                  cache: yarn

            - name: Install dependencies
              run: yarn install --frozen-lockfile

            - name: Type check
              run: yarn tsc --noEmit

            - name: Run tests
              run: yarn test

    # Android unit tests are not run in standalone CI because com.facebook.react:react-native
    # is distributed via npm, not Maven Central. Android validation happens via the example
    # app build (run manually against an emulator).
